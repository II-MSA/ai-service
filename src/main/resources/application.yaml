server:
  port: 8080 # 컨테이너 안에서 돌아갈 포트 (도커가 19091로 연결해줄 예정)

spring:
  application:
    name: ai-service

  datasource:
    url: jdbc:postgresql://localhost:5432/apang_db
    username: apang
    password: apangpass
    driver-class-name: org.postgresql.Driver

jpa:
  hibernate:
    # 테이블이 없으면 자동으로 생성해주는 설정입니다. (개발 단계에서 유용)
    ddl-auto: update
  show-sql: true
  properties:
    hibernate:
      format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:3101/eureka/
  instance:
    # 서비스 간 통신 시 호스트네임 대신 IP 주소를 사용하게 합니다.
    prefer-ip-address: true